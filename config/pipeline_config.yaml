pipeline:
  name: "RDBMS-Hadoop-Integration-Pipeline"
  version: "1.0.0"
  batch_size: 50000
  incremental_col: "updated_at"

source:
  type: "postgresql"
  host: "localhost"
  port: 5432
  database: "production_db"
  username: "etl_user"
  password: "etl_password"
  pool_size: 5
  max_overflow: 10

tables:
  customers:
    extract_mode: "incremental"
    incremental_col: "updated_at"
    partition_col: "country"
    schema:
      customer_id: "int64"
      age: "float64"
      signup_date: "datetime64[ns]"
      account_balance: "float64"
    outlier_columns:
      - age
      - account_balance

  transactions:
    extract_mode: "incremental"
    incremental_col: "transaction_date"
    partition_col: "transaction_date"
    schema:
      transaction_id: "int64"
      amount: "float64"
      transaction_date: "datetime64[ns]"
    outlier_columns:
      - amount

  products:
    extract_mode: "full"
    partition_col: "category"
    schema:
      product_id: "int64"
      price: "float64"

target:
  output_path: "data/hadoop_output"
  compression: "snappy"
  format: "parquet"

lineage:
  track: true
  version: "1.0.0"

checkpoints:
  enabled: true
  path: "data/checkpoints"